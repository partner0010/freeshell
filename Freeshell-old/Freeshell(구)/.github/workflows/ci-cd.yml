name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
      
      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: 의존성 설치
        run: |
          cd backend
          npm ci
      
      - name: 테스트 실행
        run: |
          cd backend
          npm test
        continue-on-error: true
      
      - name: 린트 검사
        run: |
          cd backend
          npm run lint
        continue-on-error: true

  build:
    name: 빌드
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
      
      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: 의존성 설치
        run: |
          cd backend
          npm ci
      
      - name: 빌드
        run: |
          cd backend
          npm run build
      
      - name: 빌드 아티팩트 저장
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: backend/dist

  deploy:
    name: 배포
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
      
      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: backend/dist
      
      - name: 서버에 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/all-in-one-content-ai/backend
            git pull origin main
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart all-in-one-content-ai || pm2 start dist/index.js --name all-in-one-content-ai
            pm2 save

